Website = "https://github.com/ThalesMMS/PGP-Client-go"
Description = "Desktop OpenPGP client for key management, encryption and digital signatures."

[Details]
  Name = "PGP Client"
  ID = "com.thalesmms.pgpclientgo"
  Version = "1.0.0"
  Build = 1
  Icon = "assets/icon.png"

[CanOpen]
  MimeTypes = "application/pgp-encrypted;application/pgp-signature;application/pgp-keys;"

[LinuxAndBSD]
  GenericName = "OpenPGP Client"
  Categories = ["Utility", "Security"]
  Comment = "Manage OpenPGP keys, encryption and digital signatures"
  Keywords = ["OpenPGP", "PGP", "encryption", "signature", "keys"]
  ExecParams = "%F"

[Migrations]
  fyneDo = true
